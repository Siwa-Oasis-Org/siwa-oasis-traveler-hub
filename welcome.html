<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Siwa Oasis</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Cairo', sans-serif; }

    .bg {
      position: fixed; inset: 0;
      background: url('photos/1.jpeg') center/cover no-repeat;
      transform: scale(1.08);
      animation: zoomOut 5s ease forwards;
      z-index: 0;
    }
    @keyframes zoomOut { to { transform: scale(1); } }

    .overlay {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.38) 55%, rgba(0,0,0,0.78) 100%);
      z-index: 1;
    }

    .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .p {
      position: absolute; border-radius: 50%; background: #FF6B35; opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      15%  { opacity: 0.55; }
      85%  { opacity: 0.25; }
      100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
    }

    .content {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }

    .tag {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 1.8rem;
      opacity: 0; transform: translateY(24px);
      animation: up 0.8s cubic-bezier(.22,1,.36,1) 0.4s forwards;
    }
    .tag-bar { width: 50px; height: 2px; background: #FF6B35; border-radius: 2px; }
    .tag-text { font-size: 0.78rem; letter-spacing: 0.35em; text-transform: uppercase; color: #FF6B35; }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.8rem, 12vw, 7rem);
      color: #fff; line-height: 1; margin-bottom: 0.6rem;
      opacity: 0; transform: translateY(36px);
      animation: up 1s cubic-bezier(.22,1,.36,1) 0.7s forwards;
    }
    h1 em { font-style: normal; color: #FF6B35; }

    .sub {
      font-size: 1.1rem; color: rgba(255,255,255,0.75);
      margin-bottom: 3.5rem;
      opacity: 0; transform: translateY(20px);
      animation: up 0.8s cubic-bezier(.22,1,.36,1) 1s forwards;
    }

    .loader-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      opacity: 0; animation: fadeIn 0.7s ease 1.5s forwards;
    }

    .enter-btn {
      margin-top: 1rem; padding: 14px 48px;
      background: #FF6B35; color: #fff; border: none; border-radius: 50px;
      font-size: 1.1rem; font-weight: 700; font-family: 'Cairo', sans-serif;
      cursor: pointer; letter-spacing: 0.05em;
      box-shadow: 0 8px 25px rgba(255,107,53,0.4);
      transition: all 0.3s;
      opacity: 0;
    }
    .enter-btn.show { animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) forwards; }

    .enter-btn:hover {
      background: #e55a2b;
      transform: translateY(-4px) scale(1.05);
    }

    @keyframes up     { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes popIn  { to { opacity: 1; transform: scale(1); } }

    body.exit { animation: exitPage 0.8s ease forwards; }
    @keyframes exitPage { to { opacity: 0; transform: scale(1.08); } }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="particles" id="pts"></div>

  <div class="content">
    <div class="tag">
      <div class="tag-bar"></div>
      <span class="tag-text">Western Desert • Egypt</span>
      <div class="tag-bar"></div>
    </div>

    <h1>Discover <em>Siwa</em></h1>
    <p class="sub">The enchanting oasis in the heart of the Western Desert</p>

    <div class="loader-wrap">
      <button class="enter-btn" id="enterbtn" onclick="enterSiwa()">
        Enter Siwa Oasis →
      </button>
    </div>
  </div>

  <script>
    // Particles
    const pts = document.getElementById('pts');
    for (let i = 0; i < 28; i++) {
      const el = document.createElement('div');
      el.className = 'p';
      const s = Math.random() * 5 + 2;
      el.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*5}s;`;
      pts.appendChild(el);
    }

    function enterSiwa() {
      document.body.classList.add('exit');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 700);
    }

    // Auto enter after 4.5 seconds
    setTimeout(() => {
      if (!document.body.classList.contains('exit')) {
        enterSiwa();
      }
    }, 4500);

    // Allow pressing Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') enterSiwa();
    });
  </script>
</body>
</html>
